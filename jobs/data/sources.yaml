# Source configs. See SPEC.md.

usajobs:
  api_base: https://data.usajobs.gov/api/search
  # List of query param sets. Each entry is one Search-API search; the scraper
  # paginates each independently and dedups by PositionID across queries.
  # Per-city queries (vs combined LocationName CSV) because Radius is a single
  # value per search and we want per-city radii to differ.
  queries:
    - name: sacramento_metro
      job_category_codes: [2210, 0343, 0301, 1701, 1710, 1712, 1740, 1750]
      location_name: "Sacramento, California"
      radius: 50
      who_may_apply: Public
      sort_field: OpenDate
      sort_direction: Desc
      results_per_page: 250
    - name: honolulu_metro
      job_category_codes: [2210, 0343, 0301, 1701, 1710, 1712, 1740, 1750]
      location_name: "Honolulu, Hawaii"
      radius: 50
      who_may_apply: Public
      sort_field: OpenDate
      sort_direction: Desc
      results_per_page: 250
    - name: monterey_metro
      job_category_codes: [2210, 0343, 0301, 1701, 1710, 1712, 1740, 1750]
      location_name: "Monterey, California"
      radius: 40
      who_may_apply: Public
      sort_field: OpenDate
      sort_direction: Desc
      results_per_page: 250
    - name: santa_cruz_metro
      job_category_codes: [2210, 0343, 0301, 1701, 1710, 1712, 1740, 1750]
      location_name: "Santa Cruz, California"
      radius: 30
      who_may_apply: Public
      sort_field: OpenDate
      sort_direction: Desc
      results_per_page: 250
    - name: oceanside_metro
      job_category_codes: [2210, 0343, 0301, 1701, 1710, 1712, 1740, 1750]
      location_name: "Oceanside, California"
      radius: 30
      who_may_apply: Public
      sort_field: OpenDate
      sort_direction: Desc
      results_per_page: 250
    - name: truckee_tahoe
      job_category_codes: [2210, 0343, 0301, 1701, 1710, 1712, 1740, 1750]
      location_name: "Truckee, California"
      radius: 40
      who_may_apply: Public
      sort_field: OpenDate
      sort_direction: Desc
      results_per_page: 250

calcareers:
  # CalCareers Advanced Search is ASP.NET WebForms / DevExpress; results render
  # via JS callbacks driven by window.location.hash. Source uses Playwright
  # (headless Chromium) — not requests — for both search and detail pages.
  # See notes/calcareers-recon.md.
  queries:
    - keyword: "Information Technology Specialist"   # catches 1402 ITS I + 1414 ITS II
    - keyword: "Staff Services Analyst"              # catches 5157 SSA-General

csu:
  # CSU Careers is PageUp People (tenant 873), shared across all 23 campuses +
  # Chancellor's Office. Server-side HTML, GET-based search. Source uses
  # requests + BeautifulSoup. Page 1 only for v1; pagination deferred until
  # results exceed page_items=50. See notes/csu-recon.md.
  queries:
    - category: "Information Systems & Technology"   # primary IT bucket
      work_type: "Staff"
    - search_keyword: "Instructional Designer"
      work_type: "Staff"
    - search_keyword: "Training Coordinator"
      work_type: "Staff"

edjoin:
  # EdJoin is CA K-12 + community college + COE job board on Microsoft IIS +
  # ASP.NET MVC 5.3 with an Azure Cognitive Search backend. Public JSON API at
  # /Home/LoadJobs; detail pages SSR HTML with schema.org JSON-LD JobPosting.
  # Source uses requests + BeautifulSoup. Pagination enabled day-1 per locked
  # decision §11.7 (stop when page returns <50 records; 20-page safety cap).
  # See notes/edjoin-recon.md "Decisions (locked 2026-06-03)".
  #
  # JT-target counties (countyIDs): El Dorado=9, Monterey=27, Nevada=29,
  # Placer=31, Sacramento=34, San Diego=37, Santa Cruz=44, Yolo=58.
  queries:
    # Lane 1 — Adult Ed Teacher (primary CTE-credential match, jobTypeID=6)
    - keywords: ""
      jobTypes: "6"
      regions: "9,27,29,31,34,37,44,58"
      rows: 50
    # Lane 2 — CTE keyword sweep
    - keywords: "CTE"
      jobTypes: "0"
      regions: "9,27,29,31,34,37,44,58"
      rows: 50
    # Lane 3 — Career Technical Education full phrase
    - keywords: "Career Technical Education"
      jobTypes: "0"
      regions: "9,27,29,31,34,37,44,58"
      rows: 50
    # Lane 4 — Remote keyword sweep (system-wide; remote roles aren't geo-bound)
    - keywords: "remote"
      jobTypes: "0"
      regions: "0"
      rows: 50
    # Lane 5 — Virtual teacher sweep (system-wide)
    - keywords: "virtual teacher"
      jobTypes: "0"
      regions: "0"
      rows: 50
